# Деплой прода (ADR-015): merge stg → main → тесты → РУЧНОЕ подтверждение
# (environment "production" с required reviewer) → deploy.sh prod.
name: deploy-prod

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    # Required reviewer настраивается в GitHub: Settings → Environments →
    # production → Required reviewers (владелец). Без Approve job не стартует.
    environment: production
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new "deploy@$HOST" \
            'sudo /usr/local/bin/medarchive-deploy prod'
