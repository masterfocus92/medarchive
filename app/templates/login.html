{% extends "base.html" %}

{% block title %}Вход — Семейная медкарта{% endblock %}

{% block content %}
{# Минимальная работающая форма по контракту T2.2-BE.
   Вёрстка на примитивах кита (field, btn-primary) — scope T2.3-FE. #}
<h1>Вход</h1>

<form method="post" action="/login">
  {% if error %}
  <p role="alert">{{ error }}</p>
  {% endif %}
  <label>
    Email
    <input type="email" name="email" value="{{ email }}" required autofocus autocomplete="username">
  </label>
  <label>
    Пароль
    <input type="password" name="password" required autocomplete="current-password">
  </label>
  <button type="submit">Войти</button>
</form>
{% endblock %}
